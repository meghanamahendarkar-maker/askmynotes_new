<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyNotes</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <!-- Main Card -->
    <div class="bg-white max-w-md w-full rounded-3xl shadow-xl p-8 space-y-5">

        <!-- Header -->
        <header class="text-center">
            <h1 class="text-4xl font-bold text-purple-700">
                AskMyNotes
            </h1>

            <p class="text-gray-500 mt-2">
                Ask questions about your notes
            </p>
        </header>

        <!-- Question -->
        <input
            type="text"
            id="question"
            placeholder="Type your question..."
            class="w-full border rounded-full px-5 py-3 outline-none focus:ring-2 focus:ring-purple-400">

        <!-- File Upload -->
        <input
            type="file"
            id="notes"
            accept=".txt,.pdf"
            class="w-full">

        <!-- Button -->
        <button
            id="submit"
            class="w-full bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-full font-semibold transition">
            Ask
        </button>

        <!-- Output -->
        <div
            id="output"
            class="bg-purple-50 rounded-2xl p-5 min-h-[120px] flex items-center justify-center">

            <!-- Loading -->
            <div
                id="loading"
                class="hidden flex flex-col items-center">

                <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>

                <p class="mt-3 text-gray-500">
                    Processing your notes...
                </p>

            </div>

            <!-- Answer -->
            <div id="answer">
                Answer will appear here...
            </div>

        </div>

    </div>

    <script>

        const button = document.getElementById("submit");
        const loading = document.getElementById("loading");
        const answer = document.getElementById("answer");

        button.addEventListener("click", () => {

            answer.classList.add("hidden");
            loading.classList.remove("hidden");

            setTimeout(() => {

                loading.classList.add("hidden");
                answer.classList.remove("hidden");

                answer.innerHTML = `
                    <strong>Answer:</strong><br><br>
                    This is where the AI-generated answer will appear after processing your uploaded notes.
                `;

            }, 3000);

        });

    </script>

</body>

</html>
