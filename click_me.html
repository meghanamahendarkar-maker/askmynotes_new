<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>click me</title>
</head>
<body>
    <h1>
        working with DOM Method
    </h1>
    <input type="text" id="t1"/>
    <button onclick=click_me()>click me</button>
    <script>
        function click_me(){
            var name=document.getElementById("t1").innerhtml;
            alert(name +"welcome to my page");
        }
    </script>
    
</body>
</html>
